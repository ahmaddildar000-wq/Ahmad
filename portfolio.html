<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmad Iftikhar — Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #050810;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px 0;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      animation: breathe 6s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #00f5ff, transparent 70%);
      top: -150px; left: -150px;
    }
    .orb-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #ff006e, transparent 70%);
      bottom: -120px; right: -120px;
      animation-delay: -3s;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50%       { transform: scale(1.12); opacity: 0.2; }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      padding: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(8, 14, 28, 0.85);
      border: 1px solid rgba(0,245,255,0.25);
      backdrop-filter: blur(24px);
      padding: 44px 40px 36px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.05),
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-color: #00f5ff;
      border-style: solid;
      opacity: 0.7;
    }
    .card::before { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

    .header { text-align: center; margin-bottom: 30px; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,245,255,0.07);
      border: 1px solid rgba(0,245,255,0.2);
      color: rgba(0,245,255,0.8);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 16px;
      margin-bottom: 24px;
      font-family: 'Orbitron', monospace;
    }
    .pulse {
      display: inline-block;
      width: 7px; height: 7px;
      background: #39ff14;
      border-radius: 50%;
      animation: pulse-anim 1.6s ease-in-out infinite;
      box-shadow: 0 0 6px #39ff14;
    }
    @keyframes pulse-anim {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .avatar-ring {
      position: relative;
      width: 110px;
      height: 110px;
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(#00f5ff, #ff006e, #00f5ff);
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(#00f5ff, #ff006e, #00f5ff);
      filter: blur(6px);
      opacity: 0.5;
      animation: spin 4s linear infinite;
      z-index: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .avatar-img {
      position: relative;
      z-index: 1;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #050810;
    }

    .name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      color: #e8f4ff;
      letter-spacing: 2px;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .name span {
      color: #00f5ff;
      text-shadow: 0 0 24px rgba(0,245,255,0.6);
    }
    .tagline {
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(107,138,170,0.85);
      text-transform: uppercase;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 28px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.3), transparent);
    }
    .divider-icon {
      color: #ff006e;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(255,0,110,0.6);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }
    .info-card {
      background: rgba(0,245,255,0.03);
      border: 1px solid rgba(0,245,255,0.1);
      padding: 16px 18px;
      position: relative;
      transition: all 0.25s;
    }
    .info-card:hover {
      border-color: rgba(0,245,255,0.4);
      background: rgba(0,245,255,0.07);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 20px rgba(0,245,255,0.08);
    }
    .info-card.wide { grid-column: 1 / -1; }
    .info-icon { font-size: 18px; display: block; margin-bottom: 8px; }
    .info-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(107,138,170,0.6);
      margin-bottom: 4px;
      font-family: 'Orbitron', monospace;
    }
    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: #e8f4ff;
      letter-spacing: 0.5px;
    }
    .info-value.gold {
      color: #ffe600;
      text-shadow: 0 0 14px rgba(255,230,0,0.4);
      font-family: 'Orbitron', monospace;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 22px;
      border-top: 1px solid rgba(0,245,255,0.08);
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-left {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(107,138,170,0.5);
      font-family: 'Orbitron', monospace;
    }
    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(57,255,20,0.07);
      border: 1px solid rgba(57,255,20,0.25);
      color: rgba(57,255,20,0.85);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      font-family: 'Orbitron', monospace;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 28px; }
      .info-grid { grid-template-columns: 1fr; }
      .info-card.wide { grid-column: 1; }
    }
  </style>
</head>
